services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: take_my_money
      POSTGRES_USER: take_my_money
      POSTGRES_PASSWORD: take_my_money
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U take_my_money -d take_my_money"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - take_my_money_postgres:/var/lib/postgresql/data

volumes:
  take_my_money_postgres:
